# =============================================================================
# GitHub Actions Release Workflow — Publish to PyPI
# =============================================================================
# Triggered on tag pushes matching v* (e.g. v1.2.0)
# Builds the package with 'python -m build' and uploads with 'twine'.
# Requires the PYPI_API_TOKEN secret in repository settings.

name: Release to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build & Publish Python Package
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution packages
        run: python -m build

      - name: Check distribution with twine
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # Optional: also build and push a Docker image on release
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag name
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
